name: CI

# The real enforcement of the TDD gate (CLAUDE.md §8). Runs on the self-hosted runner
# labelled `nexus`. Jobs grow along the test pyramid as contexts land.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Runner Smoke Test
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Report runner context
        shell: pwsh
        run: |
          Write-Output "Runner: $env:RUNNER_NAME on $env:RUNNER_OS ($env:RUNNER_ARCH)"
          Write-Output "Repo:   $env:GITHUB_REPOSITORY @ $env:GITHUB_SHA"

  backend:
    name: Backend (lint + tests)
    needs: smoke
    runs-on: self-hosted
    env:
      PYTHONDONTWRITEBYTECODE: "1"  # keep the workspace clean for actions/checkout
    defaults:
      run:
        shell: pwsh
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create venv & install
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip --quiet
          .\.venv\Scripts\python.exe -m pip install -e ".[dev]" --quiet

      - name: Ruff lint
        run: .\.venv\Scripts\python.exe -m ruff check .

      - name: Ruff format check
        run: .\.venv\Scripts\python.exe -m ruff format --check .

      - name: Pytest
        run: .\.venv\Scripts\python.exe -m pytest -q -p no:cacheprovider

  frontend:
    name: Frontend (lint + types + tests + build)
    needs: smoke
    runs-on: self-hosted
    defaults:
      run:
        shell: pwsh
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build
