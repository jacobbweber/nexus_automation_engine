# Local single-container run: builds the SPA + API into one image and serves on :8000.
services:
  nexus:
    build:
      context: .
      dockerfile: Dockerfile
    image: nexus-automation-engine:local
    ports:
      - "8000:8000"
    environment:
      NEXUS_ENVIRONMENT: local
      NEXUS_SIMULATION_MODE: "true"
      # User/Studio-authored themes persist on a writable volume (server-validated on save).
      NEXUS_THEMES_DIR: /data/themes
    volumes:
      - nexus_data:/data
      - nexus_themes:/data/themes
    restart: unless-stopped

volumes:
  nexus_data:
  nexus_themes:
